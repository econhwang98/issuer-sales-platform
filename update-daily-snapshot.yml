name: 발행사 자금 수요 레이더 daily snapshot update

on:
  schedule:
    # 08:00 KST = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-daily-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate daily snapshot
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          KRX_KIND_RSS_URL: ${{ secrets.KRX_KIND_RSS_URL }}
          FSC_SERVICE_KEY: ${{ secrets.FSC_SERVICE_KEY }}
          NEWS_ENRICH_LIMIT: ${{ vars.NEWS_ENRICH_LIMIT || '150' }}
          PAGE_DETAIL_LIMIT: ${{ vars.PAGE_DETAIL_LIMIT || '300' }}
        run: python generate_daily_snapshot.py

      - name: Validate generated snapshot
        run: |
          python -m json.tool daily_snapshot.json > /tmp/daily_snapshot.validated.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("daily_snapshot.json").read_text(encoding="utf-8"))
          issuers = data.get("issuers") or []
          assert issuers, "daily_snapshot.json has no issuers"
          assert data.get("policy_version") == "v2.0-expert-risk-structure-segmentation", "unexpected policy_version"
          required = ["risk_type", "funding_need_type", "structure_group", "action_stage", "analysis_confidence", "credit_rating_status", "long_term_rating", "short_term_rating"]
          missing = [key for key in required if key not in issuers[0]]
          assert not missing, f"missing expert fields: {missing}"
          print(f"Validated {len(issuers)} issuers")
          PY

      - name: Commit updated daily snapshot
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add daily_snapshot.json

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit"
            exit 0
          fi

          git commit -m "Update daily snapshot"
          git pull --rebase origin main
          git push origin HEAD:main
