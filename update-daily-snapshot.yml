name: 발행사 선제 영업 플랫폼 일일 스냅샷 업데이트

on:
  schedule:
    # 07:00 KST = 22:00 UTC previous day
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily snapshot
        env:
          OPENDART_API_KEY: ${{ secrets.OPENDART_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/generate_daily_snapshot.py

      - name: Commit updated snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update 발행사 선제 영업 플랫폼 daily snapshot"
          file_pattern: daily_snapshot.json
